name: Google Cloud Eventarc
description: >-
  Google Cloud Eventarc is a fully managed eventing service that allows you to
  build event-driven architectures by routing events from Google Cloud services,
  SaaS applications, and custom sources to target destinations. Eventarc supports
  both standard and advanced editions, providing scalable, serverless event
  routing with built-in security, authorization, observability, and error
  handling.
