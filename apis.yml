apis:
  - name: Google Cloud Eventarc API
    description: >-
      The Eventarc API enables you to create and manage event triggers, channels,
      and channel connections for routing events between providers and
      subscribers. It supports CloudEvents-compliant event delivery to Cloud Run,
      Cloud Functions, GKE, and Workflows targets.
